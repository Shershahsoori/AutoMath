<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PeshoX Intelligence | Entry Portal</title>
    <!-- Global styles + FontAwesome -->
    <link rel="stylesheet" href="global.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- Page-specific CSS -->
    <link rel="stylesheet" href="index.css">
    <!-- Global JS (core controller) -->
    <script src="global.js" defer></script>
    <!-- Page-specific JS -->
    <script src="index.js" defer></script>
</head>
<body>
    <div class="main-content landing-container">
        <div class="hero-glow"></div>
        <div class="hero-content">
            <h1 class="main-title">PESHOX INTELLIGENCE</h1>
            <div class="bilingual">
                <span class="english-text">Aviator Detection System</span>
                <span class="urdu-text">ایوی ایٹر ڈیٹیکشن سسٹم</span>
            </div>
            <div class="button-group">
                <button id="getAccessBtn" class="btn-primary">
                    <i class="fas fa-key"></i> GET ACCESS / رسائی حاصل کریں
                </button>
                <button id="loginBtn" class="btn-secondary">
                    <i class="fas fa-sign-in-alt"></i> LOGIN WITH ID KEY / آئی ڈی کی کے ساتھ لاگ ان کریں
                </button>
            </div>
        </div>
    </div>

    <!-- Centered loader overlay (hidden by default) -->
    <div id="loaderOverlay" class="modal-overlay" style="display: none;">
        <div class="modal-container">
            <div class="loader-spinner"></div>
            <div class="bilingual">
                <span class="english-text">Initializing system...</span>
                <span class="urdu-text">سسٹم شروع ہو رہا ہے...</span>
            </div>
        </div>
    </div>

    <!-- Footer and floating elements are auto-injected by global.js -->
</body>
</html>
